<div class="panel panel-default">
  <div class="panel-body">

    <form id="document-edit" (ngSubmit)="onSubmit(f)" #f="ngForm">
      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="name">Document Title:</label>
          <input
            type="text"
            id="name"
            name="name"
            class="form-control"
            [ngModel]="document?.name"
            #name="ngModel"
            required
            size="120"
            max="120">
        </div> 
      </div>

      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="description">Document Description:</label>
          <input
            type="text"
            id="description"
            name="description"
            class="form-control"
            [ngModel]="document?.description"
            size="120"
            max="255">
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="url">Document URL:</label>
          <input
            type="text"
            id="url"
            name="url"
            class="form-control"
            [ngModel]="document?.url"
            #url="ngModel"
            required
            size="150"
            max="255">
          <div 
            class="alert alert-danger" 
            *ngIf="(!name.valid || !url.valid) && 
            (!name.touched || !url.touched)">
            <p>The Document Title and Document URL are required fields.</p>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-xs-12 btn-toolbar">
          <button 
            class="btn btn-success" 
            type="submit" 
            [disabled]="f.invalid"> 
            Save
          </button>
          <button class="btn btn-primary" type="button" (click)="onCancel()">Cancel</button>
        </div>
      </div>

    </form>

  </div>
</div>
