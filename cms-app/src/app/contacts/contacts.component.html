<div class="row">
  <div class="col-md-5">
    <app-contact-list
      (selectedContactEvent)="selectedContact = $event"></app-contact-list>
  </div>
  <div class="col-md-5">
    <app-contact-detail
      *ngIf="selectedContact; else infoText"
      [contact]="selectedContact"></app-contact-detail>
    <ng-template #infoText> 
      <p>Select Contact</p>
    </ng-template>
  </div>
</div>
