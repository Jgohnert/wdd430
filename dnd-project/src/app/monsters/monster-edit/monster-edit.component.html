<div class="panel panel-default">
  <div class="panel-body">
    <form id="monster-edit" (ngSubmit)="onSubmit(f)" #f="ngForm">
      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="name">Name:</label>
          <input
            type="text"
            id="name"
            name="name"
            [ngModel]="monster?.name"
            #name="ngModel"
            required
            class="form-control required"
            size="120"
            max="120">
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="image">Image URL:</label>
          <input
            type="text"
            id="image"
            name="image"
            [ngModel]="monster.image"
            #image="ngModel"
            class="form-control"
            size="150"
            max="255">
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="type">type:</label>
          <input
            type="text"
            id="type"
            name="type"
            [ngModel]="monster?.type"
            #type="ngModel"
            required
            class="form-control required"
            size="120"
            max="120">
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="hp">hp:</label>
          <input
            type="text"
            id="hp"
            name="hp"
            [ngModel]="monster?.hp"
            #hp="ngModel"
            required
            class="form-control required"
            size="120"
            max="120">
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="armor">armor:</label>
          <input
            type="text"
            id="armor"
            name="armor"
            [ngModel]="monster?.armor"
            #armor="ngModel"
            required
            class="form-control required"
            size="120"
            max="120">
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="vulnerabilities">vulnerabilities:</label>
          <input
            type="text"
            id="vulnerabilities"
            name="vulnerabilities"
            [ngModel]="monster?.vulnerabilities"
            #vulnerabilities="ngModel"
            required
            class="form-control required"
            size="200"
            max="200">
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="immunity">immunity:</label>
          <input
            type="text"
            id="immunity"
            name="immunity"
            [ngModel]="monster?.immunity"
            #immunity="ngModel"
            required
            class="form-control required"
            size="200"
            max="200">
        </div>
      </div>

      <div 
        class="alert alert-danger" 
        *ngIf="(!name.valid) || (!name.touched)">
        <p>The name is required.</p>
      </div>

      <div class="row">
        <div class="col-xs-12 btn-toolbar">
          <button 
            class="btn btn-success" 
            type="submit"
            [disabled]="f.invalid">
            Save
          </button>
          <button class="btn btn-primary" type="button" (click)="onCancel()">Cancel</button>
        </div>
      </div>

    </form>
  </div>
</div>
