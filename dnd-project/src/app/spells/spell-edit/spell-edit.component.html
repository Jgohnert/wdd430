<div class="panel panel-default">
  <div class="panel-body">
    <form id="spell-edit" (ngSubmit)="onSubmit(f)" #f="ngForm">
      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="name">Name:</label>
          <input
            type="text"
            id="name"
            name="name"
            [ngModel]="spell?.name"
            #name="ngModel"
            required
            class="form-control required"
            size="120"
            max="120">
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="image">Image URL:</label>
          <input
            type="text"
            id="image"
            name="image"
            [ngModel]="spell?.image"
            #image="ngModel"
            class="form-control"
            size="150"
            max="255">
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="damageType">damageType:</label>
          <input
            type="text"
            id="damageType"
            name="damageType"
            [ngModel]="spell?.damageType"
            #damageType="ngModel"
            required
            class="form-control required"
            size="120"
            max="120">
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="level">level:</label>
          <input
            type="text"
            id="level"
            name="level"
            [ngModel]="spell?.level"
            #level="ngModel"
            required
            class="form-control required"
            size="120"
            max="120">
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="school">school:</label>
          <input
            type="text"
            id="school"
            name="school"
            [ngModel]="spell?.school"
            #school="ngModel"
            required
            class="form-control required"
            size="120"
            max="120">
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="description">description:</label>
          <input
            type="text"
            id="description"
            name="description"
            [ngModel]="spell?.description"
            #description="ngModel"
            required
            class="form-control required"
            size="200"
            max="200">
        </div>
      </div>

      <!-- <div class="row">
        <div class="form-group">
          <label class="grp-spells" for="groupList">Group spells:</label>

          <div class="row" id="groupList"
              style="min-height: 3rem;" >

            <div *ngFor="let spell of groupspells; let i = index">
              <div>
                <cms-spell-item class="col-sm-11" [spell]="spell"></cms-spell-item>
                <button class="btn btn-danger col-sm-2 deleteButton" (click)="onRemoveItem(i)">X</button>
              </div>
            </div>
            <span class="dragMsg" *ngIf="groupspells?.length < 1">Drag spells in group here</span>
          </div>

        </div>
      </div> -->

      <div 
        class="alert alert-danger" 
        *ngIf="(!name.valid) || (!name.touched)">
        <p>The name is required.</p>
      </div>

      <div class="row">
        <div class="col-xs-12 btn-toolbar">
          <button 
            class="btn btn-success" 
            type="submit"
            [disabled]="f.invalid">
            Save
          </button>
          <button class="btn btn-primary" type="button" (click)="onCancel()">Cancel</button>
        </div>
      </div>

    </form>
  </div>
</div>
